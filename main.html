<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CYBERCAIPIRA</title>
  <link rel="stylesheet" href="main.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <div id="particles-js"></div>
  <canvas id="occult-canvas" aria-hidden="true"></canvas>
  <div class="ghost-field" id="ghostField" aria-hidden="true"></div>
  <div class="screen-fog" aria-hidden="true"></div>

  <header class="header">
    <div class="moth-home-logo" id="mothHome">
      <img src="./assets/images/cicada.png" class="moth-img" alt="Logo CYBERCAIPIRA">
    </div>

    <!-- REDES -->
    <nav class="social-nav">
      <a href="https://www.instagram.com/cybercaipira/" class="social-link" aria-label="Instagram" target="_blank" rel="noreferrer">
        <span class="social-icon">
          <i class="fa-brands fa-instagram icon-base" aria-hidden="true"></i>
        </span>
      </a>
      <a href="#" class="social-link" aria-label="Discord">
        <span class="social-icon">
          <i class="fa-brands fa-discord icon-base" aria-hidden="true"></i>
        </span>
      </a>
      <a href="https://open.spotify.com/intl-pt/artist/0jMQTiRpG2qfZPape8p0R3?si=8TvrVDENQfKCnNW1dGLa6A" class="social-link" aria-label="Spotify" target="_blank" rel="noreferrer">
        <span class="social-icon">
          <i class="fa-brands fa-spotify icon-base" aria-hidden="true"></i>
        </span>
      </a>
    </nav>

  </header>

  <main class="content">
    <section class="archive-window" aria-label="Arquivo de transmissão">
      <div class="window-titlebar">
        <span class="window-title">CYBERCAIPIRA://signal/archive</span>
        <span class="window-controls" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </div>

      <div class="window-body">
        <aside class="archive-nav" aria-label="Seções do arquivo">
          <a href="#">/home</a>
          <a href="#">/audio</a>
          <a href="#">/logs</a>
          <a href="#">/contact</a>
        </aside>

        <div class="archive-main">
          <section class="intro">
            <h1>
              <span id="title" class="crt-text type-line" data-text="" data-typewriter>signal stabilized</span>
            </h1>
            <p class="intro-subtitle">
              <span class="crt-text type-line" data-text="" data-typewriter>the noise has meaning now</span>
            </p>
          </section>

          <section class="player">
            <iframe
              src="https://open.spotify.com/embed/artist/0jMQTiRpG2qfZPape8p0R3"
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
            </iframe>
          </section>
        </div>
      </div>

      <footer class="window-status">
        <span>VISITORS: 000013</span>
        <span class="status-marquee">
          <span>/// transmission unstable /// visitor logged /// do not refresh /// archive watching ///</span>
        </span>
        <span>LAST SIGNAL: 03:17 AM</span>
      </footer>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  <script src="main.js"></script>

</body>
</html>
