<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>DEPLOY_ANXIETY</title>

  <link rel="stylesheet" href="./assets/effects/crt-css-master/src/style.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="grid" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>
  <div class="screen-fog" aria-hidden="true"></div>

  <div class="home-logo">
    <img src="./assets/images/cicada.png" alt="logo" class="logo-img">
  </div>

  <main class="home-content">
    <section class="home-window" aria-label="Terminal de entrada">
      <div class="window-titlebar">
        <span class="window-title">DEPLOY_ANXIETY://boot/entry</span>
        <span class="window-controls" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </div>

      <div class="window-body">
        <h1 class="logo crt">CYBERCAIPIRA</h1>

        <div class="terminal crt" id="terminal"></div>

        <button id="enterBtn" class="hidden crt glitch-btn">
          <span class="glitch-inner" data-text="INICIAR_CRISE">INICIAR_CRISE</span>
        </button>
      </div>

      <footer class="window-status">
        <span>VISITORS: 000001</span>
        <span class="status-marquee">
          <span>/// boot archive /// signal not trusted /// wait for prompt ///</span>
        </span>
        <span>MODE: ENTRY</span>
      </footer>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
